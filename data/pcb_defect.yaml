# PKU PCB Defect Dataset
# Source: https://github.com/tangsanli5201/DeepPCB (1500 images, 6 defect classes)
# Preparation: horizontal flip augmentation → ~3000 images, split 8:1:1
# See TRAINING_GUIDE.md Step 3 for dataset preparation instructions.
#
# IMPORTANT: Set absolute paths on the training machine before running train.py
# The paths below are placeholders — replace with actual paths on training machine.

path: /path/to/pcb_dataset  # REPLACE on training machine

train: images/train
val: images/val
test: images/test

nc: 6
names:
  0: missing_hole
  1: mouse_bite
  2: open_circuit
  3: short
  4: spur
  5: spurious_copper
